openapi: 3.0.3
info:
  title: Checking Account API
  version: 1.0.0
  description: Checking account management API — baseline release
paths:
  /checking:
    post:
      operationId: createCheckingAccount
      summary: Open a new checking account
      tags: [checking]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountHolder, currency]
              properties:
                accountHolder:
                  type: string
                  example: "Acme Corp"
                currency:
                  type: string
                  enum: [CAD, USD, GBP]
                  example: CAD
                overdraftLimit:
                  type: number
                  description: Optional overdraft protection limit
                  example: 500.00
                accountTier:
                  type: string
                  enum: [basic, business, corporate]
                  default: basic
      responses:
        '201':
          description: Checking account opened
          content:
            application/json:
              schema:
                type: object
                properties:
                  accountId:     { type: string }
                  accountHolder: { type: string }
                  status:        { type: string }
    get:
      operationId: listCheckingAccounts
      summary: List checking accounts
      tags: [checking]
      parameters:
        - name: accountTier
          in: query
          schema: { type: string, enum: [basic, business, corporate] }
      responses:
        '200':
          description: List of checking accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    accountId:     { type: string }
                    accountHolder: { type: string }
                    accountTier:   { type: string }
                    balance:       { type: number }
  /checking/{accountId}/transfer:
    post:
      operationId: transferFunds
      summary: Transfer funds from checking account
      tags: [checking]
      parameters:
        - name: accountId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [destinationAccountId, amount]
              properties:
                destinationAccountId:
                  type: string
                  example: "ACC-9988776655"
                amount:
                  type: number
                  example: 250.00
                memo:
                  type: string
                  example: "Invoice #INV-2026-0042"
      responses:
        '200':
          description: Transfer initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  transferId: { type: string }
                  status:     { type: string }
  /checking/{accountId}/transactions:
    get:
      operationId: listCheckingTransactions
      summary: List transactions for a checking account
      tags: [checking]
      parameters:
        - name: accountId
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: fromDate
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Transaction list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    transactionId: { type: string }
                    amount:        { type: number }
                    type:          { type: string, enum: [debit, credit] }
                    date:          { type: string, format: date-time }
                    memo:          { type: string }
