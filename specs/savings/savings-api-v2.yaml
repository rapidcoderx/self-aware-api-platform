openapi: 3.0.3
info:
  title: Savings Account API
  version: 2.0.0
  description: >
    Savings account management API — v2.
    BREAKING CHANGES from v1:
      1. createSavingsAccount — `taxId` is now required (REQUIRED_ADDED)
      2. createSavingsAccount — `interestRate` type changed from number to object (TYPE_CHANGED)
      3. createSavingsAccount — `accountTier` enum removes 'basic', adds 'elite' (ENUM_CHANGED)
paths:
  /savings:
    post:
      operationId: createSavingsAccount
      summary: Open a new savings account
      tags: [savings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              # BREAKING: taxId is now required
              # BREAKING: interestRate changed from number → object
              # BREAKING: accountTier enum changed (basic removed, elite added)
              required: [accountHolder, initialDeposit, currency, taxId]
              properties:
                accountHolder:
                  type: string
                  example: "Jane Smith"
                initialDeposit:
                  type: number
                  example: 1000.00
                currency:
                  type: string
                  enum: [CAD, USD, GBP]
                  example: CAD
                taxId:
                  type: string
                  description: Government-issued tax identifier — now mandatory for regulatory compliance
                  example: "SIN-123-456-789"
                interestRate:
                  type: object
                  description: Interest rate configuration (changed from plain number to structured object)
                  required: [rate, compoundingPeriod]
                  properties:
                    rate:
                      type: number
                      example: 2.5
                    compoundingPeriod:
                      type: string
                      enum: [monthly, quarterly, annually]
                      example: monthly
                accountTier:
                  type: string
                  enum: [standard, premium, elite]   # 'basic' removed, 'elite' added
                  default: standard
      responses:
        '201':
          description: Savings account opened
          content:
            application/json:
              schema:
                type: object
                properties:
                  accountId:     { type: string }
                  accountHolder: { type: string }
                  status:        { type: string }
    get:
      operationId: listSavingsAccounts
      summary: List savings accounts
      tags: [savings]
      parameters:
        - name: accountTier
          in: query
          schema: { type: string, enum: [standard, premium, elite] }
        - name: currency
          in: query
          schema: { type: string }
      responses:
        '200':
          description: List of savings accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    accountId:     { type: string }
                    accountHolder: { type: string }
                    accountTier:   { type: string }
                    balance:       { type: number }
  /savings/{accountId}:
    get:
      operationId: getSavingsAccount
      summary: Get savings account details
      tags: [savings]
      parameters:
        - name: accountId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Savings account detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  accountId:     { type: string }
                  accountHolder: { type: string }
                  balance:       { type: number }
                  interestRate:  { type: object }
                  accountTier:   { type: string }
  /savings/{accountId}/transactions:
    get:
      operationId: listSavingsTransactions
      summary: List transactions for a savings account
      tags: [savings]
      parameters:
        - name: accountId
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Transaction list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    transactionId: { type: string }
                    amount:        { type: number }
                    type:          { type: string, enum: [credit, debit] }
                    date:          { type: string, format: date-time }
  /savings/{accountId}/deposit:
    post:
      operationId: depositToSavings
      summary: Deposit funds into savings account
      tags: [savings]
      parameters:
        - name: accountId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
                  example: 500.00
                reference:
                  type: string
                  example: "payroll-2026-01"
      responses:
        '200':
          description: Deposit successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactionId: { type: string }
                  newBalance:    { type: number }
