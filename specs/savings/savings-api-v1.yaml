openapi: 3.0.3
info:
  title: Savings Account API
  version: 1.0.0
  description: Savings account management API — baseline release
paths:
  /savings:
    post:
      operationId: createSavingsAccount
      summary: Open a new savings account
      tags: [savings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountHolder, initialDeposit, currency]
              properties:
                accountHolder:
                  type: string
                  example: "Jane Smith"
                initialDeposit:
                  type: number
                  example: 1000.00
                currency:
                  type: string
                  enum: [CAD, USD, GBP]
                  example: CAD
                interestRate:
                  type: number
                  description: Annual interest rate percentage (optional, system default if omitted)
                  example: 2.5
                accountTier:
                  type: string
                  enum: [basic, standard, premium]
                  default: standard
      responses:
        '201':
          description: Savings account opened
          content:
            application/json:
              schema:
                type: object
                properties:
                  accountId: { type: string }
                  accountHolder: { type: string }
                  status: { type: string }
    get:
      operationId: listSavingsAccounts
      summary: List savings accounts
      tags: [savings]
      parameters:
        - name: accountTier
          in: query
          schema: { type: string, enum: [basic, standard, premium] }
        - name: currency
          in: query
          schema: { type: string }
      responses:
        '200':
          description: List of savings accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    accountId:     { type: string }
                    accountHolder: { type: string }
                    accountTier:   { type: string }
                    balance:       { type: number }
  /savings/{accountId}:
    get:
      operationId: getSavingsAccount
      summary: Get savings account details
      tags: [savings]
      parameters:
        - name: accountId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Savings account detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  accountId:     { type: string }
                  accountHolder: { type: string }
                  balance:       { type: number }
                  interestRate:  { type: number }
                  accountTier:   { type: string }
  /savings/{accountId}/transactions:
    get:
      operationId: listSavingsTransactions
      summary: List transactions for a savings account
      tags: [savings]
      parameters:
        - name: accountId
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Transaction list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    transactionId: { type: string }
                    amount:        { type: number }
                    type:          { type: string, enum: [credit, debit] }
                    date:          { type: string, format: date-time }
  /savings/{accountId}/deposit:
    post:
      operationId: depositToSavings
      summary: Deposit funds into savings account
      tags: [savings]
      parameters:
        - name: accountId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
                  example: 500.00
                reference:
                  type: string
                  example: "payroll-2026-01"
      responses:
        '200':
          description: Deposit successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactionId: { type: string }
                  newBalance:    { type: number }
